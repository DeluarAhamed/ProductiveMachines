services:
  - type: web
    name: productive-machines-website
    env: node
    plan: starter
    buildCommand: npm install && npm run seo
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        sync: false
      - key: LEAD_NOTIFY_TO
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
